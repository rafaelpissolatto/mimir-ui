global:
  scrape_interval: 15s
  external_labels:
    source: prometheus

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']

  - job_name: mimir
    static_configs:
      - targets: ['mimir:8080']

remote_write:
  - url: http://mimir:8080/api/v1/push
    headers:
      X-Scope-OrgID: demo
