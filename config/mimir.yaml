# Mimir — monolithic mode, single node, filesystem backend.
# No external dependencies (no Consul, no MinIO).

multitenancy_enabled: true

# Use memberlist for ring coordination (no external KV store needed).
memberlist:
  join_members: []

# Filesystem backend for all storage.
# Note: each path must be completely separate — no subdirectory overlaps allowed.
common:
  storage:
    backend: filesystem
    filesystem:
      dir: /data/blocks        # uploaded block objects (bucket)

blocks_storage:
  tsdb:
    dir: /data/tsdb            # ingester local TSDB (written before upload)
    ship_interval: 1m
    block_ranges_period: [2h]
    retention_period: 3h
  bucket_store:
    sync_dir: /data/tsdb-cache # querier block cache

ruler_storage:
  backend: filesystem
  filesystem:
    dir: /data/rules

alertmanager_storage:
  backend: filesystem
  filesystem:
    dir: /data/alertmanager

# Single-node replication.
ingester:
  ring:
    replication_factor: 1

store_gateway:
  sharding_ring:
    replication_factor: 1

compactor:
  sharding_ring:
    wait_stability_min_duration: 0s

alertmanager:
  sharding_ring:
    replication_factor: 1

limits:
  native_histograms_ingestion_enabled: true
